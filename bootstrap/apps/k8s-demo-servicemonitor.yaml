apiVersion: deployments.plural.sh/v1alpha1
kind: ServiceDeployment
metadata:
  name: k8s-demo-servicemonitor
spec:
  namespace: demo-prod
  cluster: k8calab2
  git:
    url: https://github.com/kandula1/helm-charts.git
    ref: main
    folder: charts/k8s-demo-servicemonitor
  helm:
    values:
      monitors:
        - name: demo-app-monitor
          selectorLabels:
            monitored-by: prometheus
          endpoints:
            - port: metrics
              path: /metrics
              interval: 30s
              scrapeTimeout: 10s
          testApp:
            enabled: true
            image: nginx
            tag: "1.27-alpine"
            port: 80

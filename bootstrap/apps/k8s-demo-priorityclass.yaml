apiVersion: deployments.plural.sh/v1alpha1
kind: ServiceDeployment
metadata:
  name: k8s-demo-priorityclass
spec:
  namespace: demo-prod
  cluster: k8calab2
  git:
    url: https://github.com/kandula1/helm-charts.git
    ref: main
    folder: charts/k8s-demo-priorityclass
  helm:
    values:
      priorityClasses:
        - name: critical-priority
          value: 1000000
          globalDefault: false
          preemptionPolicy: PreemptLowerPriority
          description: "Critical workloads - database, auth services. Will evict lower priority pods if needed."
          testPod:
            enabled: true

        - name: high-priority
          value: 100000
          globalDefault: false
          preemptionPolicy: PreemptLowerPriority
          description: "Production application workloads. Higher than default but below critical."
          testPod:
            enabled: true

        - name: low-priority
          value: 1000
          globalDefault: false
          preemptionPolicy: Never
          description: "Batch jobs, dev workloads. Will NOT evict other pods - waits for resources."
          testPod:
            enabled: true

{{- range .Values.serviceAccounts }}
---
# ServiceAccount: {{ .name }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: plural
    app.kubernetes.io/part-of: k8s-demo-rbac

{{- if .rules }}
---
# Role for {{ .name }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .name }}-role
  namespace: {{ $.Release.Namespace }}
rules:
  {{- range .rules }}
  - apiGroups:
      {{- range .apiGroups }}
      - {{ . | quote }}
      {{- end }}
    resources:
      {{- range .resources }}
      - {{ . | quote }}
      {{- end }}
    verbs:
      {{- range .verbs }}
      - {{ . | quote }}
      {{- end }}
  {{- end }}
---
# RoleBinding for {{ .name }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .name }}-binding
  namespace: {{ $.Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .name }}-role
subjects:
  - kind: ServiceAccount
    name: {{ .name }}
    namespace: {{ $.Release.Namespace }}
{{- end }}

{{- if .clusterRules }}
---
# ClusterRole for {{ .name }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .name }}-clusterrole
rules:
  {{- range .clusterRules }}
  - apiGroups:
      {{- range .apiGroups }}
      - {{ . | quote }}
      {{- end }}
    resources:
      {{- range .resources }}
      - {{ . | quote }}
      {{- end }}
    verbs:
      {{- range .verbs }}
      - {{ . | quote }}
      {{- end }}
  {{- end }}
---
# ClusterRoleBinding for {{ .name }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .name }}-clusterrolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .name }}-clusterrole
subjects:
  - kind: ServiceAccount
    name: {{ .name }}
    namespace: {{ $.Release.Namespace }}
{{- end }}

{{- end }}
